<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Barrel Proof — a pour of bourbon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="78%">
      <stop offset="0%" stop-color="#2f1f17"/>
      <stop offset="100%" stop-color="#100a07"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="42%">
      <stop offset="0%" stop-color="#7a4416" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7a4416" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edb35e"/>
      <stop offset="45%" stop-color="#c27a2e"/>
      <stop offset="100%" stop-color="#4f2c0c"/>
    </linearGradient>
    <clipPath id="interior">
      <rect x="171" y="203" width="170" height="154" rx="17"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="256" cy="300" rx="170" ry="160" fill="url(#glow)"/>
  <ellipse cx="256" cy="392" rx="72" ry="11" fill="#c27a2e" opacity="0.16"/>

  <!-- brushed-gold label frame -->
  <rect x="38" y="38" width="436" height="436" rx="70" fill="none" stroke="#cba35a" stroke-opacity="0.55" stroke-width="3.4"/>
  <rect x="55" y="55" width="402" height="402" rx="58" fill="none" stroke="#f1cd84" stroke-opacity="0.22" stroke-width="1.6"/>

  <!-- glass body + amber pour -->
  <rect x="164" y="196" width="184" height="168" rx="22" fill="#fbf4e7" fill-opacity="0.05"/>
  <g clip-path="url(#interior)">
    <rect x="171" y="264" width="170" height="93" fill="url(#amber)"/>
    <rect x="171" y="262" width="170" height="5" fill="#f4d29a" opacity="0.55"/>
    <rect x="196" y="264" width="14" height="93" fill="#f4d29a" opacity="0.14"/>
  </g>
  <rect x="164" y="196" width="184" height="168" rx="22" fill="none" stroke="#f4e2bd" stroke-opacity="0.85" stroke-width="6"/>

  <!-- single clear ice cube -->
  <g transform="rotate(-9.5 248 250)">
    <rect x="215" y="217" width="66" height="66" rx="9" fill="#fbf4e7" fill-opacity="0.06" stroke="#fbf4e7" stroke-opacity="0.55" stroke-width="3.4"/>
    <rect x="226" y="228" width="44" height="44" rx="6" fill="none" stroke="#fbf4e7" stroke-opacity="0.2" stroke-width="2"/>
    <circle cx="232" cy="234" r="5" fill="#fbf4e7" fill-opacity="0.6"/>
  </g>

  <!-- soft specular on the glass -->
  <rect x="200" y="206" width="12" height="150" rx="6" fill="#fbf4e7" opacity="0.08"/>
</svg>
